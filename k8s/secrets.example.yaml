# Example Secret manifest for emergency or one-off local cluster bootstrap only.
# The default staging/production flow is External Secrets -> app-secrets; see:
#   - k8s/overlays/staging/external-secret.example.yaml
#   - k8s/overlays/production/external-secret.example.yaml
# NEVER commit a real Secret manifest to version control.
#
# If you need a temporary manual secret for local cluster testing:
#   1. copy this file to k8s/secrets.yaml
#   2. fill in base64-encoded values
#   3. apply with: kubectl apply -f k8s/secrets.yaml -n psd
#
# To base64-encode a value: echo -n "your-value" | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: psd
type: Opaque
data:
  # Base64-encoded Supabase project URL for browser builds
  NEXT_PUBLIC_DB_URL: aHR0cHM6Ly95b3VyLXByb2plY3Quc3VwYWJhc2UuY28=

  # Base64-encoded Supabase project URL for backend services and server-only modules
  SUPABASE_URL: aHR0cHM6Ly95b3VyLXByb2plY3Quc3VwYWJhc2UuY28=

  # Base64-encoded Supabase anon/public key
  NEXT_PUBLIC_DB_ANON_KEY: eW91cl9zdXBhYmFzZV9hbm9uX2tleQ==

  # Base64-encoded Supabase service role key (server-only)
  SUPABASE_SERVICE_ROLE_KEY: eW91cl9zdXBhYmFzZV9zZXJ2aWNlX3JvbGVfa2V5

  # Base64-encoded Google Cloud Translation API key (server-only)
  GOOGLE_TRANSLATE_API_KEY: eW91cl9nb29nbGVfdHJhbnNsYXRlX2FwaV9rZXk=

  # Base64-encoded internal event-service URL
  EVENT_SERVICE_URL: aHR0cDovL2V2ZW50LXNlcnZpY2U6NDAwMA==
