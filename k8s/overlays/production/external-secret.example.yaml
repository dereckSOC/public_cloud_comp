# Example ExternalSecret for production.
# Replace the ClusterSecretStore name and remote key paths for your platform.
# This file is not included in the overlay by default because it depends on the
# External Secrets Operator CRDs being installed in the cluster.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: psd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: platform-secrets
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: NEXT_PUBLIC_DB_URL
      remoteRef:
        key: /psd/production/NEXT_PUBLIC_DB_URL
    - secretKey: SUPABASE_URL
      remoteRef:
        key: /psd/production/SUPABASE_URL
    - secretKey: NEXT_PUBLIC_DB_ANON_KEY
      remoteRef:
        key: /psd/production/NEXT_PUBLIC_DB_ANON_KEY
    - secretKey: SUPABASE_SERVICE_ROLE_KEY
      remoteRef:
        key: /psd/production/SUPABASE_SERVICE_ROLE_KEY
    - secretKey: GOOGLE_TRANSLATE_API_KEY
      remoteRef:
        key: /psd/production/GOOGLE_TRANSLATE_API_KEY
    - secretKey: EVENT_SERVICE_URL
      remoteRef:
        key: /psd/production/EVENT_SERVICE_URL
    - secretKey: FEEDBACK_SERVICE_URL
      remoteRef:
        key: /psd/production/FEEDBACK_SERVICE_URL
    - secretKey: ANALYTICS_SERVICE_URL
      remoteRef:
        key: /psd/production/ANALYTICS_SERVICE_URL
