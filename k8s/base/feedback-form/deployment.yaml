apiVersion: apps/v1
kind: Deployment
metadata:
  name: feedback-form
  namespace: psd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: feedback-form
  template:
    metadata:
      labels:
        app: feedback-form
    spec:
      containers:
        - name: feedback-form
          image: cloud_compute_competition-feedback-form:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
